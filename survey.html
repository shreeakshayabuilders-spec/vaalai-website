<!DOCTYPE html>
<html>
<head>
<title>Digital Survey</title>
<style>
body{font-family:Arial;background:#0b132b;color:white;text-align:center;}
form{background:#1f2937;padding:20px;margin:50px auto;width:300px;border-radius:10px;}
input,textarea{width:90%;padding:10px;margin:10px;}
button{padding:10px 20px;background:gold;border:none;}
</style>
</head>

<body>

<h1>Digital Survey Form</h1>
<form onsubmit="sendMail(event)">
<input name="name" placeholder="Your Name" required>
<input name="father_name" placeholder="Father Name" required>
<input name="phone" placeholder="Phone Number" required>
<input name="email" placeholder="Email" required>
<textarea name="message"></textarea>

<textarea rows="5" placeholder="Your Problem / Requirement"></textarea>

<button type="submit">Submit</button>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("FF66PRCeZbkWWPigg");
})();

function sendMail(e){
e.preventDefault();

emailjs.sendForm("service_ty5zf9c","template_woflgfd",e.target)
.then(function(){
alert("Message Sent Successfully!");
}, function(){
alert("Failed to send");
});
}
</script>
</form>

</body>
</html>
