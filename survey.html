<!DOCTYPE html>
<html>
<head>
<title>Digital Survey</title>
<style>
body{font-family:Arial;background:#0b132b;color:white;text-align:center;}
form{background:#1f2937;padding:20px;margin:50px auto;width:300px;border-radius:10px;}
input,textarea{width:90%;padding:10px;margin:10px;}
button{padding:10px 20px;background:gold;border:none;}
</style>
</head>

<body>

<h1>Digital Survey Form</h1>

<form>
<input type="text" placeholder="Your Name" required>
<input type="text" placeholder="Father Name" required>
<input type="tel" placeholder="Phone Number" required>
<input type="email" placeholder="Email" required>

<textarea rows="5" placeholder="Your Problem / Requirement"></textarea>

<button type="submit">Submit</button>
</form>

</body>
</html>
